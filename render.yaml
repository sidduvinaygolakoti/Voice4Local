services:
  - type: web
    name: localvoice-backend
    env: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/local-voice-backend-1.0.0.jar
    envVars:
      - key: JAVA_VERSION
        value: 21
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: http://localhost:5173
