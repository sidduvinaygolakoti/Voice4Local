# ─── Server Configuration ───────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/

# ─── Application Info ────────────────────────────────────────────────────────
spring.application.name=local-voice-backend

# ─── Database Configuration (H2 by default, override with env vars) ───────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:local_voice_db;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=KEY,VALUE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT Configuration ───────────────────────────────────────────────────────
# CHANGE THIS to a random 256-bit secret in production!
app.jwt.secret=${JWT_SECRET:LocalVoice2024SecretKeyForJWTTokenGenerationAndValidation256Bits!!}
app.jwt.expiration=86400000

# ─── Cloudinary Configuration ────────────────────────────────────────────────
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:YOUR_CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY:YOUR_CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:YOUR_CLOUDINARY_API_SECRET}

# ─── Gemini AI Configuration ─────────────────────────────────────────────────
gemini.api.key=${GEMINI_API_KEY:YOUR_GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

# ─── File Upload ─────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.localvoice=DEBUG
logging.level.org.springframework.security=WARN

# ─── CORS Configuration ──────────────────────────────────────────────────────
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://localvoice.gov.in}
